name: Release binaries

# Builds the standalone (no-Node-required) executables for every platform and
# attaches them to a GitHub Release whenever a version tag is pushed, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Only runtime deps are needed to bundle; bun itself comes from setup-bun.
      - run: npm ci --omit=dev

      - name: Build all binaries
        run: npm run build:all

      - name: Generate checksums
        run: cd dist && sha256sum * > SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
